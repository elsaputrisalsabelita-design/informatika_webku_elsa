<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang - Website Pribadi</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .welcome-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-logout {
            padding: 10px 25px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-logout:hover {
            background-color: #bd2130;
        }
        .btn-main {
            padding: 10px 25px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            margin-right: 10px;
            display: inline-block;
        }
        .btn-main:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1 id="welcomeMessage">Selamat Datang!</h1>
        <p>Anda telah berhasil masuk ke dalam sistem website pribadi. Silakan pilih aksi di bawah ini untuk melanjutkan.</p>
        
        <a href="../index.html" class="btn-main">Lihat Website Utama</a>
        
        <button id="logoutBtn" class="btn-logout">Log Out</button>
    </div>

    <script src="js/welcome.js"></script>
</body>
</html>
